<script type="text/x-dc" data-dc-script>
const PEOPLE = {

const LIB = [

25',orient:'founder',src:'uploads/photo_25-a9e3839f.jpg',label:'Founder 25'},{id:'f26',orient:'founder',src:'uploads/photo_26-0ba42d5b.jpg',label:'Founder 26'},{id:'f27',orient:'founder',src:'uploads/photo_27-c8dfb364.jpg',label:'Founder 27'},{id:'f28',orient:'founder',src:'uploads/photo_28-021eacdc.jpg',label:'Founder 28'},{id:'f29',orient:'founder',src:'uploads/photo_29-86a984b6.jpg',label:'Founder 29'},{id:'f30',orient:'founder',src:'uploads/photo_30-dff07b22.jpg',label:'Founder 30'},{id:'f31',orient:'founder',src:'uploads/photo_31-f7bf9d60.jpg',label:'Founder 31'},{id:'f32',orient:'founder',src:'uploads/photo_32-f08c117c.jpg',label:'Founder 32'},{id:'f33',orient:'founder',src:'uploads/photo_33-e007c374.jpg',label:'Founder 33'},{id:'f34',orient:'founder',src:'uploads/photo_34-97ad8b81.jpg',label:'Founder 34'},{id:'f35',orient:'founder',src:'uploads/photo_35-7514c5d1.jpg',label:'Founder 35'}
];
const QUOTE_TEMPLATES = ['statement','megastatement','headline','spotlight','bigcenter','twopart','arrowpoint','list','arrowlist','socialcard','photoquote','spokesperson'];
const TEMPLATE_LABEL = {statement:'Statement', megastatement:'Big statement', headline:'Headline + portrait', spotlight:'Spotlight portrait', bigcenter:'Center quote', twopart:'Two-part', arrowpoint:'Arrow point', list:'Numbered list', arrowlist:'Arrow list', socialcard:'Social card', photoquote:'Quote on photo', spokesperson:'Spokesperson', image:'Photo'};
const SIZES = {'1200x1200':[1200,1200], '1200x627':[1200,627], '1200x1600':[1200,1600]};
const SIZE_LABEL = {'1200x1200':'Square 1:1','1200x627':'Banner','1200x1600':'Tall 3:4'};

let UID = 1;
const SAVE_KEY = 'conneticFounderStudio.v1';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

class Component extends DCLogic {
  state = { year:2026, month:6, posts:[], status:'Upload a PDF or paste content to begin.', busy:false, intakeOpen:true, savedAt:null, dirty:false, sources:{}, showGallery:false, menu:null };

  componentDidMount(){
    this._syncing = true;
    if(window.pdfjsLib){ try{ window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'; }catch(e){} }
    const c = this._load();
    try{ Object.values(c.batches).forEach(b=>(b.posts||[]).forEach(p=>{ UID=Math.max(UID,(p.id||0)+1); })); }catch(e){}
    const y = c.lastYear || this.state.year, m = c.lastMonth || this.state.month;
    const b = c.batches[y+'-'+m];
    const posts = (b && b.posts) || [];
    this.setState({ year:y, month:m, posts, savedAt:(b&&b.savedAt)||null, dirty:false, intakeOpen: !posts.length, sources:(b&&b.sources)||{} });
    if(posts.length) this.setStatus('Restored your '+this.periodLabel(y,m)+' batch \u2014 '+posts.length+' posts.');
    this._docClick=(e)=>{ if(this.state.menu && !(e.target.closest && e.target.closest('[data-menu]'))) this.setState({menu:null}); };
    document.addEventListener('click', this._docClick, true);
    this._initSync();
  }

  componentWillUnmount(){ if(this._docClick) document.removeEventListener('click', this._docClick, true); if(this._poll) clearInterval(this._poll); }

  componentDidUpdate(){
    const s=this.state;
    const snap=this._snap;
    const changed = !snap || snap.posts!==s.posts || snap.year!==s.year || snap.month!==s.month || snap.sources!==s.sources;
    this._snap = {posts:s.posts, year:s.year, month:s.month, sources:s.sources};
    if(this._suppressPush){ return; }
    if(changed){
      this._persist();
      this._queuePush();
      if(!s.dirty) this.setState({dirty:true});
    }
  }

  periodLabel(y, m){ return MONTHS[((m||this.state.month)-1+12)%12]+' '+(y||this.state.year); }
  periodKey(y, m){ return (y||this.state.year)+'-'+(m||this.state.month); }

  _fixPath(p){
    if(typeof p!=='string') return p;
    var m={'assets/img/connetic-network.png':'assets/img/connetic-network.jpg','assets/img/connetic-tech.png':'assets/img/connetic-tech.jpg','assets/img/wendal.jpg':'assets/img/wendal-sm.jpg','assets/img/brad-futureproof.jpg':'assets/img/brad-futureproof-sm.jpg','assets/img/brad-balcony.jpg':'assets/img/brad-balcony-sm.jpg','uploads/photo_17.png':'uploads/photo_17-da20ae62.jpg'};
    if(m[p]) return m[p];
    if(/^uploads\/photo_.+\.png$/.test(p)) return p.replace(/\.png$/,'.jpg');
    return p;
  }
  _normalize(d){
    try{ Object.values(d.batches||{}).forEach(b=>{ (b.posts||[]).forEach(p=>{ if(p.image) p.image=this._fixPath(p.image); if(p.wb&&p.wb.speakers) p.wb.speakers.forEach(s=>{ if(s.photo) s.photo=this._fixPath(s.photo); }); }); }); }catch(e){}
    return d;
  }
  _load(){
    try{ const r=localStorage.getItem(SAVE_KEY); if(r){ const d=JSON.parse(r); if(d && d.batches) return this._normalize(d); } }catch(e){}
    if(window.__CONNETIC_SEED__){ try{ return this._normalize(JSON.parse(JSON.stringify(window.__CONNETIC_SEED__))); }catch(e){} }
    return { batches:{}, lastYear:null, lastMonth:null };
  }

  /* ---------- shared cloud sync (Firebase Realtime Database REST) ---------- */
  cloudUrl(){ return 'https://socials-connetic-default-rtdb.firebaseio.com/store.json'; }
  async _cloudGet(){
    try{ const r = await fetch(this.cloudUrl(), {cache:'no-store'}); if(!r.ok) return null; return await r.json(); }catch(e){ return null; }
  }
  _cloudPush(){
    try{
      const c = this._load();
      c._ts = Date.now(); this._lastTs = c._ts;
      fetch(this.cloudUrl(), {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(c)})
        .then(r=>{ if(r&&r.ok){ this._cloudOk=true; } })
        .catch(()=>{});
    }catch(e){}
  }
  _queuePush(){
    if(this._suppressPush || this._syncing) return;
    clearTimeout(this._pushT);
    this._pushT = setTimeout(()=>this._cloudPush(), 700);
  }
  _adoptStore(c, announce){
    const d = this._normalize(c);
    this._lastTs = c._ts || this._lastTs || 0;
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(d)); }catch(e){}
    try{ Object.values(d.batches||{}).forEach(b=>(b.posts||[]).forEach(p=>{ UID=Math.max(UID,(p.id||0)+1); })); }catch(e){}
    const b = d.batches[this.periodKey()];
    const posts = (b && b.posts) || [];
    this._suppressPush = true;
    this.setState({ posts, savedAt:(b&&b.savedAt)||null, dirty:false, sources:(b&&b.sources)||{}, intakeOpen:!posts.length }, ()=>{ this._suppressPush=false; });
    if(announce) this.setStatus('\u2601 Loaded shared work \u2014 '+posts.length+' posts in '+this.periodLabel()+'.');
  }
  async _initSync(){
    const cloud = await this._cloudGet();
    if(cloud && cloud.batches){ this._adoptStore(cloud, true); }
    else { this._cloudPush(); }
    this._syncing = false;
    this._poll = setInterval(async ()=>{
      if(this.state.dirty || this.state.busy || this.state.showGallery) return;
      const c = await this._cloudGet();
      if(c && c.batches && (c._ts||0) > (this._lastTs||0)) this._adoptStore(c, false);
    }, 10000);
  }
  _persist(){
    try{
      const c = this._load();
      c.batches[this.periodKey()] = { posts:this.state.posts, savedAt:this.state.savedAt, sources:this.state.sources };
      c.lastYear = this.state.year; c.lastMonth = this.state.month;
      localStorage.setItem(SAVE_KEY, JSON.stringify(c));
      return true;
    }catch(e){ return false; }
  }

  saveWork(){
    const t = Date.now();
    this.setState({savedAt:t, dirty:false}, ()=>{
      const ok = this._persist();
      this._cloudPush();
      this.setStatus(ok? ('\u2713 '+this.periodLabel()+' batch saved \u2014 '+this.state.posts.length+' posts \u2014 synced to the shared cloud.') : 'Could not save \u2014 storage may be full or blocked.');
    });
  }

  exportBackup(){
    this._persist();
    const c = this._load();
    const blob = new Blob([JSON.stringify(c,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const name = 'Connetic_AllBatches_'+this.state.year+'-'+this.mm()+'.json';
    this.dl(url, name);
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    const n = Object.keys(c.batches).length;
    this.setStatus('\u2713 Backup exported \u2014 '+n+' batch'+(n===1?'':'es')+' saved to '+name+'.');
  }
  pickImport(){
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.onchange = e => { const f = e.target.files && e.target.files[0]; if(f) this.importBackup(f); };
    inp.click();
  }
  importBackup(file){
    const r = new FileReader();
    r.onload = e => {
      try{
        const d0 = JSON.parse(e.target.result);
        if(!d0 || !d0.batches) throw new Error('not a valid backup file');
        const d = this._normalize(d0);
        localStorage.setItem(SAVE_KEY, JSON.stringify(d));
        try{ Object.values(d.batches).forEach(b=>(b.posts||[]).forEach(p=>{ UID=Math.max(UID,(p.id||0)+1); })); }catch(_){}
        const y = d.lastYear || this.state.year, m = d.lastMonth || this.state.month;
        const b = d.batches[y+'-'+m]; const posts = (b && b.posts) || [];
        const n = Object.keys(d.batches).length;
        this.setState({ year:y, month:m, posts, savedAt:(b&&b.savedAt)||null, dirty:false, intakeOpen:!posts.length, sources:(b&&b.sources)||{} });
        this._cloudPush();
        this.setStatus('\u2713 Backup imported \u2014 '+n+' batch'+(n===1?'':'es')+' restored & synced to the shared cloud. Showing '+this.periodLabel(y,m)+'.');
      }catch(err){ this.setStatus('Import failed \u2014 '+err.message); }
    };
    r.readAsText(file);
  }

  moveBatch(toM, toY){
    toY = toY || this.state.year;
    if(toM===this.state.month && toY===this.state.year) return;
    const c = this._load();
    const fromKey = this.periodKey();
    const tgtKey = toY+'-'+toM;
    const tgt = c.batches[tgtKey] || {posts:[], sources:{}};
    const mergedPosts = (tgt.posts||[]).concat(this.state.posts);
    const mergedSources = Object.assign({}, tgt.sources||{}, this.state.sources);
    delete c.batches[fromKey];
    const savedAt = Date.now();
    c.batches[tgtKey] = { posts:mergedPosts, sources:mergedSources, savedAt };
    c.lastYear = toY; c.lastMonth = toM;
    localStorage.setItem(SAVE_KEY, JSON.stringify(c));
    const moved = this.state.posts.length;
    this.setState({ year:toY, month:toM, posts:mergedPosts, sources:mergedSources, savedAt, dirty:false, intakeOpen:false });
    this.setStatus('\u2713 Moved '+moved+' posts to '+this.periodLabel(toY,toM)+'. Every other month is untouched.');
  }

  switchPeriod(upd){
    this._persist();
    const y = upd.year!=null? upd.year : this.state.year;
    const m = upd.month!=null? upd.month : this.state.month;
    const c = this._load();
    const b = c.batches[y+'-'+m];
    const posts = (b && b.posts) || [];
    this.setState({ year:y, month:m, posts, savedAt:(b&&b.savedAt)||null, dirty:false, intakeOpen: !posts.length, sources:(b&&b.sources)||{} });
    this.setStatus(posts.length? ('Switched to '+this.periodLabel(y,m)+' \u2014 '+posts.length+' posts.') : ('New batch \u2014 '+this.periodLabel(y,m)+'. Add content to begin.'));
  }

  /* ---------- helpers ---------- */
  setStatus(s){ this.setState({status:s}); }
  mm(){ return String(this.state.month).padStart(2,'0'); }

  async readPdf(file){
    const buf = await file.arrayBuffer();
    if(!window.pdfjsLib) throw new Error('PDF engine not loaded');
    const doc = await window.pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=doc.numPages;i++){ const pg=await doc.getPage(i); const c=await pg.getTextContent(); text += c.items.map(it=>it.str).join(' ')+'\n'; }
    return text.replace(/\s+/g,' ').trim();
  }
  async readDocx(file){
    if(!window.JSZip) throw new Error('Zip engine not loaded');
    const zip = await window.JSZip.loadAsync(await file.arrayBuffer());
    const f = zip.file('word/document.xml');
    if(!f) throw new Error('Not a .docx');
    let xml = await f.async('string');
    let t = xml.replace(/<\/w:p>/g,'\n').replace(/<w:tab[^>]*>/g,'\t').replace(/<[^>]+>/g,'');
    t = t.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;|&apos;/g,"'");
    return t.replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
  }
  async readDoc(file){
    const n=(file.name||'').toLowerCase();
    if(n.endsWith('.pdf')||file.type==='application/pdf') return this.readPdf(file);
    if(n.endsWith('.docx')||(file.type||'').indexOf('wordprocessingml')>=0) return this.readDocx(file);
    if(n.endsWith('.doc')){ try{ return await this.readDocx(file); }catch(e){ return (await file.text()).replace(/[^\x09\x0A\x0D\x20-\x7E]+/g,' ').replace(/\s+/g,' ').trim(); } }
    return (await file.text());
  }
  isDocFile(f){ const n=(f.name||'').toLowerCase(); return n.endsWith('.pdf')||n.endsWith('.docx')||n.endsWith('.doc')||f.type==='application/pdf'||(f.type||'').indexOf('wordprocessingml')>=0; }

  extractJson(s){ const a=s.indexOf('['), b=s.lastIndexOf(']'); if(a>=0&&b>a) return s.slice(a,b+1); return s; }
  fallbackPhrases(text, min, max){
    const sents = text.split(/(?<=[.!?])\s+/).map(x=>x.trim()).filter(x=>x.length>25&&x.length<160);
    let count = Math.round(sents.length/3) || min;
    count = Math.max(min, Math.min(max, count));
    const out=[]; for(let i=0;i<count;i++){ const isQ = i % 3 !== 0; out.push({type:isQ?'quote':'image', phrase:isQ?(sents[i%Math.max(sents.length,1)]||'').slice(0,120):''}); }
    return out;
  }
  async aiPhrases(text, min, max){
    if(!window.claude || !window.claude.complete) return this.fallbackPhrases(text,min,max);
    const prompt = 'You are a social media editor for "Connetic", an accessible venture-capital firm (Connetic RIA LLC). Read the content and create BETWEEN '+min+' AND '+max+' social posts. Decide the exact NUMBER based on how much genuinely distinct, substantive material the content contains \u2014 create a post only where there is a real, standalone idea worth sharing, and do NOT pad to hit a target. Thin content should yield fewer posts (down to '+min+'); rich content more (up to '+max+'). Return ONLY a JSON array, no prose. Each element: {"type":"quote"|"image","phrase":"..."}. Roughly 70% should be type "quote" and 30% type "image". For "quote", phrase = the single most poignant, punchy takeaway as a short sentence (max 16 words), no surrounding quotation marks, no attribution. For "image", phrase = "". Vary the quotes. CONTENT:\n'+text.slice(0,12000);
    try{
      const res = await window.claude.complete(prompt);
      const arr = JSON.parse(this.extractJson(res));
      if(Array.isArray(arr)&&arr.length) return arr.slice(0,max).map(x=>({type:x.type==='image'?'image':'quote', phrase:(x.phrase||'').replace(/^["'\u201c\u201d]+|["'\u201c\u201d]+$/g,'')}));
    }catch(e){}
    return this.fallbackPhrases(text,min,max);
  }

  pickImage(size, i){
    const want = size==='1200x1600' ? 'tall' : (size==='1200x627' ? 'wide' : 'land');
    let pool = LIB.filter(l=>l.orient===want);
    if(!pool.length) pool = LIB;
    return pool[((i%pool.length)+pool.length)%pool.length].src;
  }
  makePost(person, type, phrase, i){
    const tpl = type==='image' ? 'image' : QUOTE_TEMPLATES[i % QUOTE_TEMPLATES.length];
    const size = '1200x1200';
    const img = this.pickImage(size, i);
    return { id:UID++, person, type, template:tpl, size:size, quote:phrase||'', image:img, selected:true };
  }

  async generate(person, files, text){
    const cfg = PEOPLE[person];
    this.setState({busy:true});
    try{
      let content = text||'';
      let srcNames = null;
      if(files && files.length){
        const parts=[];
        for(let i=0;i<files.length;i++){ this.setStatus('Reading file '+(i+1)+' / '+files.length+' for '+cfg.name+'\u2026'); parts.push(await this.readDoc(files[i])); }
        content = parts.join('\n\n');
        srcNames = Array.from(files).map(f=>f.name);
      } else if(text && text.trim()){ srcNames = ['pasted text']; }
      const kept = this.state.sources[person];
      if((!content || content.length<20) && kept && kept.text){ content = kept.text; srcNames = kept.names; this.setStatus('Using kept content for '+cfg.name+'\u2026'); }
      if(!content || content.length<20){ this.setStatus('No readable text found \u2014 add a PDF or paste content.'); this.setState({busy:false}); return; }
      const sources = Object.assign({}, this.state.sources);
      sources[person] = { names: srcNames || (kept&&kept.names) || ['saved content'], text: content.slice(0,60000) };

      this.patch(post.id,{quote:(res||orig).trim().replace(/^["'\u201c\u201d]+|["'\u201c\u201d]+$/g,'').slice(0,160), fb:''});

    this.patch(post.id,{quote:v.slice(0,a)+'*'+v.slice(a,b)+'*'+v.slice(b)});

  /* ---------- PowerPoint (editable) export ---------- */
  rgbToHex(c){ const m=(c||'').match(/[\d.]+/g); if(!m) return '000000'; const h=n=>('0'+Math.round(+n).toString(16)).slice(-2); return (h(m[0])+h(m[1])+h(m[2])).toUpperCase(); }
  textBoxOf(node, root, sx){
    const r=node.getBoundingClientRect(); const cs=getComputedStyle(node);
    const size=Math.round(parseFloat(cs.fontSize)*sx*0.75*10)/10;
    const weight=parseInt(cs.fontWeight)||400; const bold=weight>=600;
    const fam=(cs.fontFamily||'').toLowerCase();
    const fontFace= fam.indexOf('poppins')>=0 ? 'Calibri' : 'Arial';
    const align=cs.textAlign==='center'?'center':(cs.textAlign==='right'?'right':'left');
    const lh=Math.min(Math.max((parseFloat(cs.lineHeight)/parseFloat(cs.fontSize))||1.12,0.8),2);
    const baseColor=this.rgbToHex(cs.color);
    const runs=[];
    node.childNodes.forEach(n=>{
      if(n.nodeType===3){ const t=n.textContent; if(t) runs.push({text:t, options:{color:baseColor,bold:bold,fontFace:fontFace}}); }
      else if(n.nodeType===1){ const ccs=getComputedStyle(n); runs.push({text:n.textContent, options:{color:this.rgbToHex(ccs.color), bold:((parseInt(ccs.fontWeight)||weight)>=600), fontFace:fontFace}}); }
    });
    if(!runs.length) runs.push({text:node.textContent, options:{color:baseColor,bold:bold,fontFace:fontFace}});
    return { el:node, x:(r.left-root.left)*sx, y:(r.top-root.top)*sx, w:r.width*sx+6, h:r.height*sx+10, runs:runs, align:align, size:size, lh:lh };
  }
  collectTextBoxes(node){
    const root=node.getBoundingClientRect(); const sx=1200/(root.width||1200);
    const INLINE={SPAN:1,EM:1,B:1,I:1,STRONG:1,A:1};
    const out=[];
    const leaf=(el)=>{ if(!el.textContent||!el.textContent.trim()) return false; for(let i=0;i<el.children.length;i++){ if(!INLINE[el.children[i].tagName]) return false; } return true; };
    const walk=(el)=>{ for(let i=0;i<el.children.length;i++){ const c=el.children[i]; const tag=c.tagName; if(tag==='IMG'||tag==='svg'||tag==='SVG') continue; if(leaf(c)) out.push(this.textBoxOf(c, root, sx)); else walk(c); } };
    walk(node);
    return out;
  }
  async addPptxSlide(pptx, post, W, H){
    const node=document.getElementById('full-'+post.id);
    if(!node) return;
    const slide=pptx.addSlide();
    const boxes=this.collectTextBoxes(node);
    const hidden=boxes.map(b=>{ const prev=b.el.style.visibility; b.el.style.visibility='hidden'; return [b.el,prev]; });
    let dataUrl;
    try{ dataUrl=await window.htmlToImage.toPng(node,{width:W,height:H,pixelRatio:1,cacheBust:true,backgroundColor:'#ffffff'}); }
    finally{ hidden.forEach(p=>{ p[0].style.visibility=p[1]; }); }
    slide.addImage({data:dataUrl, x:0, y:0, w:W/96, h:H/96});
    boxes.forEach(b=>{
      slide.addText(b.runs, {x:b.x/96, y:b.y/96, w:b.w/96, h:b.h/96, align:b.align, valign:'top', margin:0, fontSize:b.size, lineSpacingMultiple:b.lh, wrap:true});
    });
  }
  async exportPptx(){
    if(!window.PptxGenJS){ this.setStatus('PowerPoint engine not loaded \u2014 try again in a moment.'); return; }
    const list=this.state.posts;
    if(!list.length){ this.setStatus('No posts to export.'); return; }
    this.setState({busy:true, menu:null});
    const groups={}; list.forEach(p=>{ (groups[p.size]=groups[p.size]||[]).push(p); });
    const sizes=Object.keys(groups);
    try{
      const files=[];
      for(let s=0;s<sizes.length;s++){
        const size=sizes[s]; const dim=SIZES[size]; const W=dim[0], H=dim[1];
        const pptx=new window.PptxGenJS();
        pptx.defineLayout({name:'CT', width:W/96, height:H/96}); pptx.layout='CT';
        for(let i=0;i<groups[size].length;i++){ this.setStatus('Building PowerPoint slide '+(i+1)+'/'+groups[size].length+' ('+SIZE_LABEL[size]+')\u2026'); await this.addPptxSlide(pptx, groups[size][i], W, H); }
        const blob=await pptx.write('blob');
        files.push({name:this.state.year+'_'+this.mm()+'_Connetic_Brad_'+size+'.pptx', blob:blob});
      }
      if(files.length===1){ this.dl(URL.createObjectURL(files[0].blob), files[0].name); this.setStatus('\u2713 Exported '+list.length+' editable PowerPoint slides.'); }
      else { const zip=new window.JSZip(); files.forEach(f=>zip.file(f.name,f.blob)); const z=await zip.generateAsync({type:'blob'}); this.dl(URL.createObjectURL(z), this.state.year+'_'+this.mm()+'_Connetic_PowerPoint.zip'); this.setStatus('\u2713 Exported '+list.length+' editable slides as '+files.length+' files (one per dimension) in a zip.'); }
    }catch(e){ this.setStatus('PowerPoint export error: '+e.message); }
    this.setState({busy:false});
  }

          el('button',{key:'ty',onClick:()=>this.patch(post.id,{type:post.type==='quote'?'image':'quote'}),style:Object.assign(miniBtn(),{flex:1})}, post.type==='quote'?'\u2192 Make photo post':'\u2192 Make quote post')
        ]):null,
        usesQuote? el('div',{key:'fb',style:{display:'flex',gap:'7px'}},[
          el('input',{key:'i',value:post.fb||'',onChange:e=>this.patch(post.id,{fb:e.target.value}),onKeyDown:e=>{ if(e.key==='Enter') this.revisePhrase(post); },placeholder:'Feedback to AI (e.g. \u201cshorter, bolder\u201d)\u2026',style:{flex:1,minWidth:0,padding:'8px',borderRadius:'8px',border:'1px solid #dde4e5',fontFamily:'var(--sans)',fontSize:'12px'}}),
          el('button',{key:'b',onClick:()=>this.revisePhrase(post),style:Object.assign(miniBtn(),{whiteSpace:'nowrap'})},'\u21bb Revise')
        ]) : null,
        (usesQuote||post.type==='webinar')? el('div',{key:'tp',style:{display:'flex',gap:'7px'}},[sel]) : null,
        post.type!=='webinar'? el('div',{key:'r2',style:{display:'flex',gap:'7px'}},[szSel, imgSel]):null,
        usesPhoto? el('div',{key:'fg'},[
          el('div',{key:'l',style:{fontSize:'10px',fontWeight:700,letterSpacing:'.06em',color:'#9aa7ab',textTransform:'uppercase',margin:'2px 0 5px'}},'Founder photos \u2014 tap to use'),
          el('div',{key:'g',style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:'4px',maxHeight:'132px',overflowY:'auto',padding:'5px',border:'1px solid #e0e6e7',borderRadius:'8px',background:'#f7faf9'}},
            LIB.filter(l=>l.orient==='founder').map(l=> el('button',{key:l.id,title:l.label,onClick:()=>this.patch(post.id,{image:l.src}),style:{padding:0,border:post.image===l.src?'2px solid var(--accent)':'1px solid #d7dee0',borderRadius:'5px',overflow:'hidden',cursor:'pointer',aspectRatio:'1/1',background:'#dde'}},[
              el('img',{key:'i',src:l.src,loading:'lazy',style:{width:'100%',height:'100%',objectFit:'cover',display:'block'}})
            ]))
          )
        ]):null,
        usesPhoto? el('div',{key:'up',style:{display:'flex',gap:'14px',alignItems:'center',flexWrap:'wrap',rowGap:'5px'}},[
          el('label',{key:'u',style:{fontSize:'11px',color:'var(--accent)',cursor:'pointer',fontWeight:600}},['\u2191 Upload image',
            el('input',{key:'i',type:'file',accept:'image/*',style:{display:'none'},onChange:e=>{ if(e.target.files[0]) this.onUpload(post,e.target.files[0]); }})]),
          el('button',{key:'p',onClick:()=>this.pasteImageUrl(post),style:{fontSize:'11px',color:'var(--accent)',cursor:'pointer',fontWeight:600,background:'none',border:'none',padding:0}},'\uD83D\uDD17 Paste URL')
        ]):null,
        el('div',{key:'r3',style:{display:'flex',gap:'7px',marginTop:'2px'}},[
          el('button',{key:'dl',onClick:()=>this.downloadOne(post),style:Object.assign(miniBtn(),{flex:1,background:'var(--ink)',color:'#fff',borderColor:'var(--ink)'})},'\u2193 Download'),
          el('button',{key:'rm',onClick:()=>this.remove(post.id),style:Object.assign(miniBtn(),{color:'#b04a3a'})},'Remove')
        ])
      ])
    ]);
  }

  renderVals(){ return { appBody: this.renderApp() }; }
}

function el(){ return React.createElement.apply(null, arguments); }
function selStyle(){ return {flex:1,minWidth:0,padding:'7px 8px',borderRadius:'8px',border:'1px solid #dde4e5',fontFamily:'var(--sans)',fontSize:'12px',background:'#fbfdfc',cursor:'pointer'}; }
function miniBtn(){ return {fontFamily:'var(--sans)',fontWeight:600,fontSize:'12px',padding:'8px 10px',borderRadius:'8px',border:'1px solid #cdd6d7',background:'#fff',cursor:'pointer',color:'var(--ink)'}; }
</script>
</body>
</html>
